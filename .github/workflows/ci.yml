name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python-version:
          - "3.11"
          - "3.12"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e .

      - name: Run unit and end-to-end tests
        run: >-
          python -m unittest
          cli_anything.unity_mcp.tests.test_core
          cli_anything.unity_mcp.tests.test_coverage
          cli_anything.unity_mcp.tests.test_file_ipc
          cli_anything.unity_mcp.tests.test_heuristics
          cli_anything.unity_mcp.tests.test_learning_ledger
          cli_anything.unity_mcp.tests.test_memory
          cli_anything.unity_mcp.tests.test_physics_feel
          cli_anything.unity_mcp.tests.test_skills_base
          cli_anything.unity_mcp.tests.test_chat_e2e
          cli_anything.unity_mcp.tests.test_full_e2e
          -v

      - name: Verify CLI help
        run: cli-anything-unity-mcp --help
